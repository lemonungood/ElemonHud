<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>初始设置</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f8fafc;
    }
    .setup-card {
      width: 90%;
      max-width: 400px;
      padding: 32px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      border: 1px solid #f1f5f9;
      text-align: center;
    }
    h1 {
      color: #1e293b;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: 600;
    }
    h1 i {
      margin-right: 8px;
      color: #3b82f6;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      margin: 10px 0;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      font-size: 14px;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #2563eb;
    }
    .tip {
      color: #64748b;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="setup-card">
    <h1><i class="fas fa-lock"></i> 初始密码设置</h1>
    <p style="color: #64748b; margin-bottom: 20px;">设置老师端登录密码</p>
    <input type="password" id="pwd" placeholder="输入密码（不少于6位）">
    <input type="password" id="pwd-confirm" placeholder="确认密码">
    <button class="btn" onclick="savePassword()"><i class="fas fa-save"></i> 保存密码</button>
    <div class="tip"><i class="fas fa-info-circle"></i> 设置完成后将进入学生端</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    async function savePassword() {
      const pwd = document.getElementById('pwd').value;
      const pwdConfirm = document.getElementById('pwd-confirm').value;

      if (!pwd || pwd.length < 6) {
        alert('密码长度不能少于6位！');
        return;
      }
      if (pwd !== pwdConfirm) {
        alert('两次输入的密码不一致！');
        return;
      }

      const res = await ipcRenderer.invoke('save-init-password', pwd);
      if (res.success) {
        alert('密码设置成功！');
        window.location.href = 'student.html';
      } else {
        alert('密码设置失败，请重试！');
      }
    }
  </script>
</body>
</html>
